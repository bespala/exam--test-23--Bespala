<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Client 1 - EMQX MQTT</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      padding: 30px;
      margin: 0;
    }

    .container {
      max-width: 650px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
    }

    .info {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      border-radius: 8px;
    }

    input {
      border: 1px solid #cbd5e1;
    }

    button {
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .messages {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      min-height: 160px;
      max-height: 350px;
      overflow-y: auto;
    }

    .message {
      background: white;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 4px solid #94a3b8;
    }

    .status {
      font-weight: bold;
    }

    h1 { color: #2563eb; }
    button { background: #2563eb; }
    button:hover { background: #1d4ed8; }
    .messages { background: #eff6ff; }
    .status.connected { color: #15803d; }
    .status.disconnected { color: #dc2626; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Web Client 1</h1>

    <div class="info">
      <b>Broker:</b> EMQX<br />
      <b>WebSocket:</b> ws://localhost:8083/mqtt<br />
      <b>Topic:</b> exam/messages
    </div>

    <p>Статус: <span id="status" class="status disconnected">Connecting...</span></p>

    <input id="messageInput" type="text" placeholder="Введіть повідомлення..." />
    <button onclick="sendMessage()">Надіслати повідомлення</button>

    <div class="messages">
      <h3>Отримані повідомлення:</h3>
      <div id="messages"></div>
    </div>
  </div>

  <script>
    const topic = "exam/messages";
    const client = mqtt.connect("ws://localhost:8083/mqtt");

    client.on("connect", () => {
      const status = document.getElementById("status");
      status.textContent = "Connected";
      status.className = "status connected";

      client.subscribe(topic);
      addMessage("System", "Web Client 1 підключено до EMQX broker");
    });

    client.on("reconnect", () => {
      document.getElementById("status").textContent = "Reconnecting...";
    });

    client.on("error", (error) => {
      const status = document.getElementById("status");
      status.textContent = "Connection error";
      status.className = "status disconnected";
      console.error(error);
    });

    client.on("message", (receivedTopic, message) => {
      addMessage(receivedTopic, message.toString());
    });

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value.trim();

      if (!text) {
        alert("Введіть повідомлення");
        return;
      }

      const payload = JSON.stringify({
        sender: "Web Client 1",
        message: text,
        time: new Date().toLocaleTimeString()
      });

      client.publish(topic, payload);
      input.value = "";
    }

    function addMessage(sender, message) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "message";
      div.innerHTML = `<b>${sender}</b><br />${message}`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
